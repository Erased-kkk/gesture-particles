<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国用电量实时全息看板</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        canvas { display: block; }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 10;
            display: block;
        }
        #input_video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }

        /* 全息地板网格线 */
        #grid-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 40%;
            background: radial-gradient(ellipse at center, rgba(0,150,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* 玻璃拟态主看板 */
        #dashboard {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 320px;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(100, 180, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 24px;
            color: #fff;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }
        #dashboard.collapsed {
            transform: translateX(-110%);
            opacity: 0;
            pointer-events: none;
        }

        .dash-title {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: rgba(180, 210, 255, 0.8);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .dash-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(0,150,255,0.4), transparent);
            margin-bottom: 18px;
        }

        .province-name {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #60b0ff, #c0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }
        .province-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .metric-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .metric-value { font-size: 22px; font-weight: 600; color: #ffb74d; transition: all 0.3s ease; }
        .metric-unit { font-size: 11px; color: rgba(255,255,255,0.4); margin-left: 4px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .status-badge.high { background: rgba(255,80,80,0.2); color: #ff7070; border: 1px solid rgba(255,80,80,0.3); }
        .status-badge.normal { background: rgba(100,200,100,0.15); color: #80e080; border: 1px solid rgba(100,200,100,0.25); }
        .status-badge.low { background: rgba(60,140,255,0.15); color: #80b8ff; border: 1px solid rgba(60,140,255,0.25); }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.high { background: #ff5050; box-shadow: 0 0 8px #ff5050; }
        .status-dot.normal { background: #60e060; box-shadow: 0 0 8px #60e060; }
        .status-dot.low { background: #5090ff; box-shadow: 0 0 8px #5090ff; }

        .color-row { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
        .color-row label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        #color-picker {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: transparent; cursor: pointer; padding: 2px;
        }

        .hint-row { margin-top: 14px; font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.6; }

        /* 浮动按钮 */
        .float-btn {
            position: absolute;
            top: 24px;
            width: 40px; height: 40px;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 90;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            transition: 0.2s;
        }
        .float-btn:hover { background: rgba(255,255,255,0.15); }
        #toggle-ui { left: 24px; top: auto; bottom: 24px; }
        #toggle-fs { right: 24px; }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffb74d; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 省份切换过渡提示 */
        #province-toast {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 60px;
            font-weight: 700;
            letter-spacing: 6px;
            color: rgba(255,200,100,0.9);
            pointer-events: none;
            z-index: 50;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
        }
        #province-toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div>正在启动全国电力全息看板...</div>
    </div>

    <div id="grid-overlay"></div>

    <div id="video-container">
        <video id="input_video"></video>
    </div>

    <div id="dashboard">
        <div class="dash-title">⚡ 全国用电量实时全息看板</div>
        <div class="dash-divider"></div>
        <div class="province-name" id="province-name">北京</div>
        <div class="province-sub" id="province-sub">BEIJING · 华北电网</div>

        <div class="metric-row">
            <span class="metric-label">实时负荷</span>
            <span><span class="metric-value" id="metric-power">3200</span><span class="metric-unit">万 kW</span></span>
        </div>

        <div class="metric-row">
            <span class="metric-label">运行状态</span>
            <span class="status-badge normal" id="status-badge">
                <span class="status-dot normal"></span> 正常
            </span>
        </div>

        <div class="metric-row">
            <span class="metric-label">省内排名</span>
            <span style="font-size:14px;color:rgba(255,255,255,0.7);" id="metric-rank">#12 / 34</span>
        </div>

        <div class="color-row">
            <label>粒子色</label>
            <input type="color" id="color-picker" value="#ffaa33">
        </div>

        <div class="hint-row">
            🖐 左手滑动 → 下一省<br>
            ✋ 右手滑动 → 上一省
        </div>
    </div>

    <div id="toggle-fs" class="float-btn" title="全屏">⛶</div>
    <div id="toggle-ui" class="float-btn" title="切换面板">☰</div>
    <div id="province-toast"></div>

    <!-- 引入库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // ==================== 配置与全局变量 ====================
        const PARTICLE_COUNT = 15000;
        const SWIPE_THRESHOLD = 0.12;
        const COOLDOWN_MS = 400;

        let scene, camera, renderer, particles, geometry;
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let provinceParticleRanges = [];
        let selectedProvinceIndex = 0;
        let handHistory = { Left: [], Right: [] };
        let isCooldown = false;
        let provinceHighlightFactor = 0;
        let baseParticleColor = new THREE.Color('#ffaa33');

        // ==================== 34 省份数据 ====================
        // x=经度映射(-20~+20), z=纬度映射(+15北~-15南), power=模拟用电量(万kW)
        const provinces = [
            { name: '北京', x: 7.3, z: 10.5, power: 2800 },
            { name: '天津', x: 8.0, z: 9.8, power: 2100 },
            { name: '河北', x: 6.5, z: 8.5, power: 7200 },
            { name: '山西', x: 4.5, z: 7.5, power: 5500 },
            { name: '内蒙古', x: 2.0, z: 13.0, power: 6800 },
            { name: '辽宁', x: 9.5, z: 12.0, power: 4800 },
            { name: '吉林', x: 10.5, z: 14.5, power: 2600 },
            { name: '黑龙江', x: 11.5, z: 17.5, power: 3200 },
            { name: '上海', x: 10.5, z: 3.0, power: 3500 },
            { name: '江苏', x: 9.0, z: 4.5, power: 8200 },
            { name: '浙江', x: 9.8, z: 2.0, power: 6500 },
            { name: '安徽', x: 7.5, z: 4.0, power: 4200 },
            { name: '福建', x: 9.0, z: -2.0, power: 3800 },
            { name: '江西', x: 7.0, z: 0.5, power: 3100 },
            { name: '山东', x: 8.5, z: 7.0, power: 8500 },
            { name: '河南', x: 5.5, z: 5.5, power: 6200 },
            { name: '湖北', x: 5.0, z: 2.5, power: 4500 },
            { name: '湖南', x: 4.5, z: 0.0, power: 3800 },
            { name: '广东', x: 6.0, z: -7.0, power: 8300 },
            { name: '广西', x: 2.5, z: -5.5, power: 3000 },
            { name: '海南', x: 4.0, z: -11.0, power: 900 },
            { name: '重庆', x: 2.0, z: 1.5, power: 2800 },
            { name: '四川', x: 0.0, z: 1.0, power: 5600 },
            { name: '贵州', x: 2.5, z: -2.5, power: 2600 },
            { name: '云南', x: -0.5, z: -5.0, power: 3400 },
            { name: '西藏', x: -8.0, z: 1.5, power: 800 },
            { name: '陕西', x: 2.5, z: 6.5, power: 4000 },
            { name: '甘肃', x: -1.5, z: 8.0, power: 2400 },
            { name: '青海', x: -5.5, z: 5.0, power: 1500 },
            { name: '宁夏', x: 0.5, z: 9.0, power: 1800 },
            { name: '新疆', x: -14.0, z: 10.0, power: 3600 },
            { name: '台湾', x: 11.5, z: -4.5, power: 2800 },
            { name: '香港', x: 6.5, z: -8.5, power: 1200 },
            { name: '澳门', x: 5.5, z: -9.0, power: 800 },
        ];

        // ==================== 1. Three.js 初始化 ====================
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.0008);
            scene.background = new THREE.Color(0x050510);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 38, 42);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 网格地板 - 全息感
            const gridHelper = new THREE.PolarGridHelper(28, 64, 40, 128, 0x1a3355, 0x1a3355);
            gridHelper.position.y = -12;
            scene.add(gridHelper);

            // 中心辉光
            const glowGeo = new THREE.RingGeometry(0, 25, 64);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x112244, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
            const glowRing = new THREE.Mesh(glowGeo, glowMat);
            glowRing.rotation.x = -Math.PI / 2;
            glowRing.position.y = -11.5;
            scene.add(glowRing);

            // 粒子系统
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 60;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: baseParticleColor,
                size: 0.45,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            generateShapes();
            targetPositions = new Float32Array(shapes.map);

            window.addEventListener('resize', onWindowResize);
        }

        // ==================== 2. 地图粒子热力生成 ====================
        const shapes = { map: [] };

        function generateShapes() {
            const totalPower = provinces.reduce((s, p) => s + p.power, 0);
            const mapArr = [];
            provinceParticleRanges = [];

            let offset = 0;
            for (let pi = 0; pi < provinces.length; pi++) {
                const p = provinces[pi];
                const count = Math.round(PARTICLE_COUNT * (p.power / totalPower));
                const actualCount = pi === provinces.length - 1
                    ? PARTICLE_COUNT - offset
                    : count;

                // 扩散半径 = 基础半径 + 用电量加成
                const baseRadius = 1.5;
                const powerRadius = (p.power / 8500) * 3.5;
                const radius = baseRadius + powerRadius;

                for (let i = 0; i < actualCount; i++) {
                    // 圆盘内随机分布 (高斯偏移让中心更密)
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.sqrt(Math.random()) * radius * (0.6 + Math.random() * 0.8);
                    const px = p.x + Math.cos(angle) * dist;
                    const pz = p.z + Math.sin(angle) * dist * 0.7; // 纬度方向略微压缩

                    // Y 高度 = 功率映射 + 随机噪声
                    const baseY = p.power / 500;
                    const py = baseY * (0.5 + Math.random() * 0.5) + (Math.random() - 0.5) * 1.5;

                    mapArr.push(px, py, pz);
                }

                provinceParticleRanges.push({ start: offset, end: offset + actualCount - 1 });
                offset += actualCount;
            }

            // 补齐差额粒子（浮点舍入导致）
            while (offset < PARTICLE_COUNT) {
                const p = provinces[0];
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 2;
                mapArr.push(p.x + Math.cos(angle) * dist, p.power / 500 * Math.random(), p.z + Math.sin(angle) * dist);
                offset++;
            }

            shapes.map = new Float32Array(mapArr);
        }

        // ==================== 3. MediaPipe 双手滑动识别 ====================
        function initMediaPipe() {
            const videoElement = document.getElementById('input_video');

            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandsResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 480,
                height: 360
            });

            cameraUtils.start()
                .then(() => {
                    document.getElementById('loading').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                })
                .catch(err => {
                    console.error('Camera Init Error:', err);
                    document.getElementById('loading').innerHTML = '无法启动摄像头。<br>请确保允许权限并使用 HTTPS/Localhost。';
                });
        }

        function onHandsResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const now = performance.now();

            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = results.multiHandedness[i];
                if (!handedness) continue;

                const label = handedness.label; // "Left" or "Right"
                const handX = landmarks[9].x; // 中指根 x 坐标

                // 记录历史
                if (!handHistory[label]) handHistory[label] = [];
                handHistory[label].push({ x: handX, time: now });

                // 保留最近 150ms 内的记录
                handHistory[label] = handHistory[label].filter(h => now - h.time < 150);
                if (handHistory[label].length < 2) continue;

                const oldest = handHistory[label][0];
                const newest = handHistory[label][handHistory[label].length - 1];
                const deltaX = newest.x - oldest.x;

                // 检测快速滑动
                if (Math.abs(deltaX) > SWIPE_THRESHOLD && !isCooldown) {
                    if (label === 'Left') {
                        nextProvince();
                    } else if (label === 'Right') {
                        prevProvince();
                    }

                    // 冷却
                    isCooldown = true;
                    setTimeout(() => { isCooldown = false; }, COOLDOWN_MS);

                    // 清空历史防止重复触发
                    handHistory.Left = [];
                    handHistory.Right = [];
                    break;
                }
            }
        }

        function nextProvince() {
            selectedProvinceIndex = (selectedProvinceIndex + 1) % provinces.length;
            provinceHighlightFactor = 0;
            updateDashboard();
            showToast(provinces[selectedProvinceIndex].name);
            // 激发选中省份粒子
            scatterProvinceParticles(selectedProvinceIndex);
        }

        function prevProvince() {
            selectedProvinceIndex = (selectedProvinceIndex - 1 + provinces.length) % provinces.length;
            provinceHighlightFactor = 0;
            updateDashboard();
            showToast(provinces[selectedProvinceIndex].name);
            scatterProvinceParticles(selectedProvinceIndex);
        }

        function scatterProvinceParticles(index) {
            const range = provinceParticleRanges[index];
            if (!range) return;
            const pos = particles.geometry.attributes.position.array;
            for (let i = range.start; i <= range.end; i++) {
                const i3 = i * 3;
                pos[i3 + 1] += (Math.random() - 0.5) * 4;
                pos[i3] += (Math.random() - 0.5) * 2;
                pos[i3 + 2] += (Math.random() - 0.5) * 2;
            }
            particles.geometry.attributes.position.needsUpdate = true;
        }

        // ==================== 4. 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);

            const positions = particles.geometry.attributes.position.array;
            const time = Date.now() * 0.001;

            // 选中省份呼吸高亮因子
            provinceHighlightFactor += (1 - provinceHighlightFactor) * 0.08;
            const boost = Math.sin(time * 3) * 3 + 3; // 0~6 浮动范围

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const tx = targetPositions[i3];
                const ty = targetPositions[i3 + 1];
                const tz = targetPositions[i3 + 2];

                let lx = tx;
                let ly = ty;
                let lz = tz;

                const lerpSpeed = 0.04;

                positions[i3]     += (lx - positions[i3]) * lerpSpeed;
                positions[i3 + 1] += (ly - positions[i3 + 1]) * lerpSpeed;
                positions[i3 + 2] += (lz - positions[i3 + 2]) * lerpSpeed;
            }

            // 选中省份粒子浮动上升
            const range = provinceParticleRanges[selectedProvinceIndex];
            if (range) {
                for (let i = range.start; i <= range.end; i++) {
                    const i3 = i * 3;
                    const ty = targetPositions[i3 + 1];
                    positions[i3 + 1] += (ty + boost * provinceHighlightFactor - positions[i3 + 1]) * 0.06;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.0008;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==================== 5. UI 看板更新 ====================
        function updateDashboard() {
            const p = provinces[selectedProvinceIndex];

            // 名称
            document.getElementById('province-name').textContent = p.name;
            document.getElementById('province-sub').textContent =
                p.name.toUpperCase() + ' · 区域电网';

            // 功率（加微小波动模拟实时变化）
            const fluctuation = 1 + (Math.random() - 0.5) * 0.06;
            const displayPower = Math.round(p.power * fluctuation);
            document.getElementById('metric-power').textContent = displayPower;

            // 状态判定
            let statusClass, statusText;
            if (p.power > 6000) {
                statusClass = 'high'; statusText = '高负荷';
            } else if (p.power > 2500) {
                statusClass = 'normal'; statusText = '正常';
            } else {
                statusClass = 'low'; statusText = '低负荷';
            }

            const badge = document.getElementById('status-badge');
            badge.className = 'status-badge ' + statusClass;
            badge.innerHTML = '<span class="status-dot ' + statusClass + '"></span> ' + statusText;

            // 排名（按功率降序）
            const sorted = [...provinces].sort((a, b) => b.power - a.power);
            const rank = sorted.findIndex(pp => pp.name === p.name) + 1;
            document.getElementById('metric-rank').textContent = '#' + rank + ' / ' + provinces.length;
        }

        function showToast(name) {
            const toast = document.getElementById('province-toast');
            toast.textContent = name;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 800);
        }

        // ==================== 6. 启动 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initThree();
            initMediaPipe();
            animate();
            updateDashboard();

            // 颜色选择
            document.getElementById('color-picker').addEventListener('input', (e) => {
                baseParticleColor.set(e.target.value);
                particles.material.color.copy(baseParticleColor);
            });

            // 面板折叠
            const dashboard = document.getElementById('dashboard');
            document.getElementById('toggle-ui').addEventListener('click', () => {
                dashboard.classList.toggle('collapsed');
            });

            // 全屏
            document.getElementById('toggle-fs').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            });

            // 键盘切换（备用）
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextProvince();
                if (e.key === 'ArrowLeft') prevProvince();
            });
        });
    </script>
</body>
</html>
